name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build --build-tests
      - name: Run unit tests with coverage
        run: swift test --filter stellar_wallet_sdkTests --enable-code-coverage
      - name: Export coverage to lcov
        run: |
          BIN=$(swift build --show-bin-path)
          XCTEST=$(find "$BIN" -name "*.xctest" -type d | head -1)
          BINEXE="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
          xcrun llvm-cov export -format=lcov "$BINEXE" \
            -instr-profile "$BIN/codecov/default.profdata" \
            -ignore-filename-regex='(Tests|\.build)/.*' \
            | sed "s|$(pwd)/||g" > coverage.lcov
          echo "covered source files: $(grep -c '^SF:' coverage.lcov)"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: false
          verbose: true
